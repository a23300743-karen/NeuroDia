<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroDia — Acceso</title>
<link rel="stylesheet" href="css/styles.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
</head>
<body>

<div class="split-layout">

  <!-- PANEL IZQUIERDO -->
  <aside class="brand-panel">
    <div class="brand-inner">
      <div class="brand-logo">
        <img src="assets/neurodia.png" alt="NeuroDia logo">
        <span class="brand-name">NeuroDia</span>
      </div>
  </aside>

  <!-- PANEL DERECHO -->
  <main class="form-panel">

    <!-- Tabs -->
    <div class="form-tabs" role="tablist">
      <button class="tab active" id="tab-login" role="tab" aria-selected="true" onclick="switchTab('login')">Iniciar sesión</button>
      <button class="tab" id="tab-registro" role="tab" aria-selected="false" onclick="switchTab('registro')">Registrarse</button>
    </div>

    <!-- ── LOGIN ── -->
    <section class="form-card active" id="form-login" role="tabpanel">
      <div class="form-header">
        <h2>Bienvenido de vuelta</h2>
        <p>Ingresa tus credenciales para continuar.</p>
      </div>

      <div id="login-error" class="alert alert-error" style="display:none"></div>
      <div id="login-success" class="alert alert-success" style="display:none"></div>

      <form id="loginForm" novalidate>
        <div class="field-group">
          <label for="login-email">Correo electrónico</label>
          <input type="email" id="login-email" name="email" placeholder="medico@ceti.mx" autocomplete="email" required>
          <span class="field-error" id="err-login-email"></span>
        </div>

        <div class="field-group">
          <label for="login-password">Contraseña</label>
          <div class="input-with-icon">
            <input type="password" id="login-password" name="password" placeholder="••••••••" autocomplete="current-password" required>
            <button type="button" class="toggle-pw" onclick="togglePw('login-password', this)" aria-label="Mostrar contraseña">
              <svg id="eye-login" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
          <span class="field-error" id="err-login-password"></span>
        </div>

        <div class="field-row">
          <label class="checkbox-label">
            <input type="checkbox" id="remember"> Recordar sesión
          </label>
          <a href="#" class="link-subtle">¿Olvidaste tu contraseña?</a>
        </div>

        <div class="field-group">
          <label>Tipo de acceso</label>
          <div class="role-selector">
            <button type="button" class="role-btn active" data-role="medico" onclick="selectRole(this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Médico
            </button>
            <button type="button" class="role-btn" data-role="paciente" onclick="selectRole(this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
              Paciente
            </button>
            <button type="button" class="role-btn" data-role="admin" onclick="selectRole(this)">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M4.22 4.22l2.12 2.12M17.66 17.66l2.12 2.12M2 12h3M19 12h3M4.22 19.78l2.12-2.12M17.66 6.34l2.12-2.12"/></svg>
              Admin
            </button>
          </div>
        </div>

        <input type="hidden" id="login-role" value="medico">

        <button type="submit" class="btn-primary" id="login-btn">
          <span class="btn-text">Iniciar sesión</span>
          <span class="btn-loader" style="display:none">
            <svg class="spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          </span>
        </button>
      </form>

      <p class="form-footer-note">¿No tienes cuenta? <a onclick="switchTab('registro')" class="link-accent">Crear cuenta →</a></p>
    </section>

    <!-- ── REGISTRO ── -->
    <section class="form-card" id="form-registro" role="tabpanel">
      <div class="form-header">
        <h2>Crear cuenta</h2>
        <p>Completa el formulario para acceder al sistema.</p>
      </div>

      <div id="reg-error" class="alert alert-error" style="display:none"></div>
      <div id="reg-success" class="alert alert-success" style="display:none"></div>

      <form id="registroForm" novalidate>
        <div class="two-col">
          <div class="field-group">
            <label for="reg-nombre">Nombre(s)</label>
            <input type="text" id="reg-nombre" placeholder="María Elena" required>
            <span class="field-error" id="err-reg-nombre"></span>
          </div>
          <div class="field-group">
            <label for="reg-apellidos">Apellidos</label>
            <input type="text" id="reg-apellidos" placeholder="Flores García" required>
            <span class="field-error" id="err-reg-apellidos"></span>
          </div>
        </div>

        <div class="field-group">
          <label for="reg-email">Correo electrónico</label>
          <input type="email" id="reg-email" placeholder="correo@ceti.mx" required>
          <span class="field-error" id="err-reg-email"></span>
        </div>

        <div class="two-col">
          <div class="field-group">
            <label for="reg-password">Contraseña</label>
            <div class="input-with-icon">
              <input type="password" id="reg-password" placeholder="Mínimo 8 caracteres" required>
              <button type="button" class="toggle-pw" onclick="togglePw('reg-password', this)" aria-label="Mostrar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="field-error" id="err-reg-password"></span>
          </div>
          <div class="field-group">
            <label for="reg-password2">Confirmar contraseña</label>
            <div class="input-with-icon">
              <input type="password" id="reg-password2" placeholder="Repetir contraseña" required>
              <button type="button" class="toggle-pw" onclick="togglePw('reg-password2', this)" aria-label="Mostrar">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <span class="field-error" id="err-reg-password2"></span>
          </div>
        </div>

        <div class="two-col">
          <div class="field-group">
            <label for="reg-rol">Rol en el sistema</label>
            <select id="reg-rol" required>
              <option value="">Seleccionar...</option>
              <option value="medico">Médico / Investigador</option>
              <option value="paciente">Paciente</option>
              <option value="admin">Administrador</option>
            </select>
            <span class="field-error" id="err-reg-rol"></span>
          </div>
        </div>

        <div class="field-group">
          <label class="checkbox-label">
            <input type="checkbox" id="reg-terms" required>
            Acepto el uso de datos para fines de investigación médica bajo confidencialidad.
          </label>
          <span class="field-error" id="err-reg-terms"></span>
        </div>

        <button type="submit" class="btn-primary" id="reg-btn">
          <span class="btn-text">Crear cuenta</span>
          <span class="btn-loader" style="display:none">
            <svg class="spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
          </span>
        </button>
      </form>

      <p class="form-footer-note">¿Ya tienes cuenta? <a onclick="switchTab('login')" class="link-accent">Iniciar sesión →</a></p>
    </section>

  </main>
</div>

<script src="js/login.js"></script>
</body>
</html>
